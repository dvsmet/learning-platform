# Конфиг Nginx для learning.dvsmet.ru
# Копировать в /etc/nginx/sites-available/learning и сделать symlink в sites-enabled

# Редирект HTTP → HTTPS (для прямых заходов и Certbot)
server {
    listen 80;
    listen [::]:80;
    server_name learning.dvsmet.ru 95.182.121.83;
    return 301 https://$host$request_uri;
}

# Основной сервер — HTTPS
server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name learning.dvsmet.ru 95.182.121.83;

    # SSL (Certbot)
    ssl_certificate /etc/letsencrypt/live/learning.dvsmet.ru/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/learning.dvsmet.ru/privkey.pem;
    include /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem;

    location / {
        proxy_pass http://127.0.0.1:5233;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection keep-alive;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_cache_bypass $http_upgrade;
    }
}
